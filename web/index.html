<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotelClick</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>HotelClick</h1>

        <div class="botoes-topo">
            <button onclick="cadastro.classList.remove('oculto')">
                + Novo Quarto
            </button>

            <button onclick="cadastroReserva.classList.remove('oculto')">
                + Nova Reserva
            </button>
        </div>
    </header>

    <section class="titulo">
        <h2>Quartos Cadastrados</h2>
    </section>

    <main></main>

    <section class="titulo">
        <h2>Reservas</h2>
    </section>

    <div id="listaReservas"></div>

    <div id="cadastro" class="modal oculto">
        <div class="janela">

            <h2>Adicionar Quarto</h2>

            <form id="formCad">

                <label>Número do Quarto</label>
                <input type="number" id="nome" required>

                <label>Tipo</label>
                <select id="tipo">
                    <option value="Solteiro">Solteiro</option>
                    <option value="Casal">Casal</option>
                    <option value="Luxo">Luxo</option>
                    <option value="Presidencial">Presidencial</option>
                </select>

                <div class="acoes">
                    <button type="reset" onclick="cadastro.classList.add('oculto')">
                        Cancelar
                    </button>

                    <button type="submit">
                        Cadastrar
                    </button>
                </div>

            </form>

        </div>
    </div>
    <div id="detalhes" class="modal oculto">

        <div class="janela">

            <h2 id="tituloReceita"></h2>

            <label>Número</label>
            <input type="number" id="nomeEdit">

            <label>Tipo</label>
            <select id="tipoEdit">
                <option value="Solteiro">Solteiro</option>
                <option value="Casal">Casal</option>
                <option value="Luxo">Luxo</option>
                <option value="Presidencial">Presidencial</option>
            </select>

            <div class="acoes">
                <button onclick="salvarEdicao()">
                    Salvar
                </button>

                <button onclick="excluirQuartoAtual()">
                    Excluir
                </button>

                <button onclick="detalhes.classList.add('oculto')">
                    Fechar
                </button>
            </div>

        </div>

    </div>

    <div id="cadastroReserva" class="modal oculto">

        <div class="janela">

            <h2>Nova Reserva</h2>

            <form id="formReserva">

                <label>Nome do Hóspede</label>
                <input type="text" id="hospede" required>

                <label>Data de Entrada</label>
                <input type="date" id="dataEntrada" required>

                <label>Data de Saída</label>
                <input type="date" id="dataSaida">

                <label>ID do Quarto</label>
                <input type="number" id="quartoId" required>

                <div class="acoes">

                    <button type="button" onclick="cadastroReserva.classList.add('oculto')">
                        Cancelar
                    </button>

                    <button type="submit">
                        Reservar
                    </button>

                </div>

            </form>

        </div>

    </div>

    <div id="detalhesReserva" class="modal oculto">

        <div class="janela">

            <h2>Editar Reserva</h2>

            <label>Hóspede</label>
            <input type="text" id="hospedeEdit">

            <label>Data Entrada</label>
            <input type="date" id="dataEntradaEdit">

            <label>Data Saída</label>
            <input type="date" id="dataSaidaEdit">

            <label>ID do Quarto</label>
            <input type="number" id="quartoIdEdit">

            <div class="acoes">

                <button onclick="salvarReserva()">
                    Salvar
                </button>

                <button onclick="excluirReservaAtual()">
                    Excluir
                </button>

                <button onclick="detalhesReserva.classList.add('oculto')">
                    Fechar
                </button>

            </div>

        </div>

    </div>




    <script src="script.js"></script>

</body>

</html>
